<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Visita AR - CTRL IA</title>
    <!-- Inclui a biblioteca A-Frame (para 3D) e AR.js (para AR) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .arjs-loader {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .arjs-loader div {
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        .arjs-loader p {
            margin-top: 15px;
            font-size: 1.2em;
        }
        .arjs-loader button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
        }
        #playButton {
            display: none; /* Inicialmente oculto, aparece após o AR carregar */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-family: Arial, sans-serif;
            text-align: center;
            z-index: 10000;
        }
        #playButton p {
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        #playButton button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <!-- Loader customizado para AR.js -->
    <div class="arjs-loader">
        <div>
            <p>Carregando experiência de Realidade Aumentada...</p>
            <button id="startButton" style="display: none;">Iniciar AR</button>
        </div>
    </div>

    <!-- Interface para dar play no vídeo devido a restrições de autoplay -->
    <div id="playButton">
        <p>Aponte a câmera para o cartão de visita e clique em Iniciar Vídeo.</p>
        <button id="videoPlay">Iniciar Vídeo</button>
    </div>

    <!-- Definição da cena AR -->
    <a-scene
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true;"
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        embedded
        id="arScene"
    >
        <!-- Define o asset do vídeo -->
        <a-assets>
            <video id="vendedorVideo" src="./video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <!-- Marcador AR personalizado
             AGORA COM O CAMINHO RELATIVO CORRETO! -->
        <a-marker type="pattern" url="./marker/vendedor-pattern.patt">
            <!-- Um plano para exibir o vídeo. Ajuste width/height e position conforme necessário. -->
            <a-plane
                src="#vendedorVideo"
                width="1.6"
                height="0.9"
                position="0 0 0"
                rotation="-90 0 0"
                material="shader: flat; transparent: false; side: front;"
                id="videoPlane"
            ></a-plane>
        </a-marker>

        <!-- Câmera AR -->
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const videoElement = document.getElementById('vendedorVideo');
            const videoPlane = document.getElementById('videoPlane');
            const playButtonDiv = document.getElementById('playButton');
            const videoPlayButton = document.getElementById('videoPlay');
            const arScene = document.getElementById('arScene');
            const startButton = document.getElementById('startButton');
            const arjsLoader = document.querySelector('.arjs-loader');

            let arReady = false;

            // Lidar com o carregamento do AR.js
            arScene.addEventListener('loaded', () => {
                arReady = true;
                arjsLoader.style.display = 'none'; // Esconde o loader quando a cena AR está pronta
                playButtonDiv.style.display = 'block'; // Mostra o botão de play
            });

            // Lidar com o botão de play do vídeo
            videoPlayButton.addEventListener('click', () => {
                if (arReady && videoElement) {
                    videoElement.play().then(() => {
                        console.log("Vídeo iniciado com sucesso!");
                        playButtonDiv.style.display = 'none'; // Esconde a interface de play
                    }).catch(error => {
                        console.error("Erro ao tentar reproduzir o vídeo:", error);
                        alert("Não foi possível iniciar o vídeo. Por favor, tente novamente ou verifique as permissões da câmera.");
                    });
                }
            });

            // Se o vídeo pausar (ex: perder o marcador), tenta pausar o vídeo
            arScene.addEventListener('markerLost', () => {
                if (videoElement && !videoElement.paused) {
                    videoElement.pause();
                }
            });

            // Se o vídeo for encontrado novamente, tenta dar play
            arScene.addEventListener('markerFound', () => {
                if (videoElement && videoElement.paused && playButtonDiv.style.display === 'none') {
                    videoElement.play().catch(error => {
                        console.error("Erro ao tentar reproduzir o vídeo após encontrar marcador:", error);
                        // Pode ser necessário mostrar o botão de play novamente se o erro persistir
                    });
                });
            }
        });
    </script>
</body>
</html>
