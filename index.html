<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width,
             initial-scale=1.0,
             maximum-scale=1.0,
             user-scalable=no,
             viewport-fit=cover"
  />

  <title>AR Video</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- ARJS -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .info {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;

      background: rgba(0,0,0,0.7);
      color: #fff;

      padding: 10px 18px;
      border-radius: 12px;

      font-size: 14px;
    }

    .start-button {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;

      background: #000;
      color: #fff;

      border: none;
      padding: 16px 28px;

      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>

<div class="info">
  Aponte para o marcador Hiro
</div>

<button class="start-button" id="startButton">
  Iniciar AR
</button>

<a-scene
  embedded
  vr-mode-ui="enabled: false"

  renderer="
    antialias: true;
    alpha: true;
  "

  arjs="
    sourceType: webcam;
    facingMode: environment;
    debugUIEnabled: false;
  "
>

  <!-- VIDEO -->
  <a-assets>

    <video
      id="video"
      src="video.mp4"

      preload="auto"

      loop
      muted

      playsinline
      webkit-playsinline

      crossorigin="anonymous"
    ></video>

  </a-assets>

  <!-- MARKER -->
  <a-marker preset="hiro">

    <a-video
      src="#video"

      position="0 0.03 0"

      rotation="-90 0 0"

      width="1.6"
      height="0.9"
    ></a-video>

  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

<script>

  const startButton = document.getElementById("startButton");
  const video = document.getElementById("video");

  async function startAR() {

    try {

      // IOS FIX
      video.muted = true;

      await video.play();

      startButton.style.display = "none";

    } catch (err) {

      console.log(err);

      alert("Erro ao iniciar vídeo.");

    }

  }

  startButton.addEventListener("click", startAR);

</script>

</body>
</html>
