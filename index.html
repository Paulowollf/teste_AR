<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <!-- REMOVE ZOOM MOBILE -->
  <meta
    name="viewport"
    content="width=device-width,
             initial-scale=1.0,
             maximum-scale=1.0,
             user-scalable=no,
             viewport-fit=cover"
  />

  <title>AR Video</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- ARJS -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000;
      touch-action: none;
      font-family: Arial, sans-serif;
    }

    canvas,
    video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    .info {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
    }

    .start-button {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;

      background: #000;
      color: #fff;
      border: none;

      padding: 16px 28px;
      border-radius: 14px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="info">
  Aponte para o marcador Hiro
</div>

<button class="start-button" id="startButton">
  Iniciar AR
</button>

<a-scene
  embedded
  vr-mode-ui="enabled: false"

  renderer="
    antialias: true;
    alpha: true;
    precision: medium;
  "

  arjs="
    sourceType: webcam;
    debugUIEnabled: false;
    trackingMethod: best;
    facingMode: environment;

    displayWidth: 1280;
    displayHeight: 720;
  "
>

  <a-assets>

    <!-- VIDEO IOS -->
    <video
      id="video"

      src="video.mp4"

      preload="auto"

      loop
      muted
      autoplay

      playsinline
      webkit-playsinline

      x5-video-player-type="h5"
      x5-video-player-fullscreen="false"

      crossorigin="anonymous"
    ></video>

  </a-assets>

  <!-- MARCADOR -->
  <a-marker preset="hiro">

    <!-- VIDEO -->
    <a-video
      src="#video"

      position="0 0.03 0"

      rotation="-90 0 0"

      width="1.6"
      height="0.9"
    ></a-video>

  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

<script>

  const button = document.getElementById("startButton");
  const video = document.getElementById("video");

  // FORÇA PLAY IOS
  async function startAR() {

    try {

      video.muted = true;

      video.setAttribute("muted", true);
      video.setAttribute("playsinline", true);
      video.setAttribute("webkit-playsinline", true);

      await video.play();

      button.style.display = "none";

    } catch (e) {

      console.log(e);

      alert("Toque novamente para iniciar.");

    }

  }

  button.addEventListener("click", startAR);

  // REMOVE SUPER ZOOM ANDROID
  window.addEventListener("camera-init", () => {

    setTimeout(() => {

      const camVideo = document.querySelector("video");

      if (camVideo) {

        camVideo.style.objectFit = "contain";

      }

    }, 1000);

  });

</script>

</body>
</html>
