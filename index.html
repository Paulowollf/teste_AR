<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AR Video</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .info {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="info">
  Aponte a câmera para o marcador Hiro
</div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  vr-mode-ui="enabled: false"
>

  <!-- VIDEO -->
  <a-assets>
    <video
      id="video"
      src="video.mp4.mp4"
      preload="auto"
      autoplay
      loop
      muted
      playsinline
      webkit-playsinline
    ></video>
  </a-assets>

  <!-- MARCADOR -->
  <a-marker preset="hiro">

    <!-- VIDEO HOLOGRAMA -->
    <a-video
      src="#video"
      position="0 0.5 0"
      rotation="-90 0 0"
      width="1.6"
      height="0.9"
    ></a-video>

  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
