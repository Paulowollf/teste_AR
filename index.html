<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AR Video</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .button {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;

      padding: 15px 25px;

      border: none;
      border-radius: 12px;

      background: rgb(238, 0, 0);
      color: white;

      font-size: 16px;
    }

    .info {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);

      z-index: 999;

      background: rgba(255, 0, 0, 0.7);
      color: white;

      padding: 10px 16px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="info">
  Aponte para o marcador Hiro
</div>

<button class="button" onclick="playVideo()">
  Iniciar Vídeo
</button>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; debugUIEnabled: false;"
>

  <a-assets>

    <video
      id="video"
      src="video.mp4"

      preload="auto"

      loop
      muted

      playsinline
      webkit-playsinline

      crossorigin="anonymous"
    ></video>

  </a-assets>

  <!-- MARCADOR -->
  <a-marker preset="hiro">

    <!-- VIDEO -->
    <a-video
      src="#video"

      position="0 0.03 0"

      rotation="-90 0 0"

      width="1.6"
      height="0.9"
    ></a-video>

  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

<script>

  function playVideo() {

    const video = document.getElementById("video");

    video.play();

  }

</script>

</body>
</html>
