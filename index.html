<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Visita - Realidade Aumentada</title>
    
    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.5/aframe/aframe-ar.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #arScene {
            width: 100%;
            height: 100vh;
        }
        
        .info-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10;
            max-width: 300px;
        }
        
        .info-overlay h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .info-overlay p {
            margin: 5px 0;
            line-height: 1.4;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 30px 50px;
            border-radius: 10px;
            text-align: center;
            z-index: 20;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            z-index: 10;
            max-width: 90%;
        }
        
        .permission-request {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 30;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .permission-request h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .permission-request p {
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
        }
        
        .permission-request button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .permission-request button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div id="loadingScreen" class="loading">
        <div class="spinner"></div>
        <p>Iniciando câmera...</p>
    </div>
    
    <div id="permissionRequest" class="permission-request" style="display: none;">
        <h3>Permissão de Câmera Necessária</h3>
        <p>Esta experiência de RA precisa acessar sua câmera para funcionar.</p>
        <button onclick="requestCameraPermission()">Permitir Câmera</button>
    </div>
    
    <a-scene 
        id="arScene"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; maxDetectionRate: 30;" 
        vr-mode-ui="enabled: false">
        
        <!-- Câmera -->
        <a-entity camera></a-entity>
        
        <!-- Marcador (padrão Hiro) -->
        <a-marker preset="hiro">
            <!-- Vídeo em realidade aumentada -->
            <a-video 
                id="arVideo"
                src="assets/video.mp4" 
                width="4" 
                height="3"
                rotation="-90 0 0"
                position="0 0 0"
                autoplay
                loop
                playsinline>
            </a-video>
            
            <!-- Caixa ao redor do vídeo (opcional) -->
            <a-box 
                position="0 0 0.1" 
                scale="4 3 0.1"
                rotation="-90 0 0"
                material="color: #2c3e50; transparent: true; opacity: 0.1">
            </a-box>
        </a-marker>
        
        <!-- Luz ambiente -->
        <a-entity light="type: ambient; intensity: 1.5; color: white;"></a-entity>
    </a-scene>
    
    <div class="info-overlay">
        <h2>Cartão de Visita</h2>
        <p><strong>Sua Empresa</strong></p>
        <p>seu.email@empresa.com</p>
        <p>(XX) XXXX-XXXX</p>
    </div>
    
    <div class="instructions">
        📱 Aponte para o marcador Hiro (símbolo no cartão) para ver o vídeo em RA
    </div>
    
    <script>
        // Verificar suporte a WebXR
        window.addEventListener('load', function() {
            // Tentar acessar câmera automaticamente
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    // Câmera concedida
                    stream.getTracks().forEach(track => track.stop());
                    setTimeout(() => {
                        document.getElementById('loadingScreen').style.display = 'none';
                    }, 1500);
                })
                .catch(function(error) {
                    // Câmera negada
                    document.getElementById('loadingScreen').style.display = 'none';
                    document.getElementById('permissionRequest').style.display = 'block';
                });
        });
        
        function requestCameraPermission() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    stream.getTracks().forEach(track => track.stop());
                    document.getElementById('permissionRequest').style.display = 'none';
                    location.reload();
                })
                .catch(function(error) {
                    alert('Permissão de câmera foi negada. Por favor, permita o acesso às configurações do navegador.');
                });
        }
        
        // Feedback visual quando o vídeo for detectado
        document.addEventListener('markerFound', function() {
            console.log('Marcador detectado!');
        });
        
        document.addEventListener('markerLost', function() {
            console.log('Marcador perdido!');
        });
    </script>
</body>
</html>
