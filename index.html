<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Visita - RA</title>
    
    <!-- Scripts de RA -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .arjs-loader {
            height: 100%; width: 100%; position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center; color: white;
        }
        #instruction {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 10px 20px;
            border-radius: 20px; z-index: 1000; text-align: center; width: 80%;
        }
    </style>

    <script>
        // Registro do componente ANTES da cena carregar
        AFRAME.registerComponent('vidhandler', {
            init: function () {
                this.video = document.querySelector('#meuVideo');
            },
            tick: function () {
                if (this.el.object3D.visible == true) {
                    if (!this.toggle) {
                        this.toggle = true;
                        this.video.play();
                    }
                } else {
                    this.toggle = false;
                    this.video.pause();
                }
            }
        });
    </script>
</head>

<body>
    <!-- Overlay de Instrução -->
    <div id="instruction">📱 Aponte para o QR Code para ver o vídeo</div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <!-- O vídeo deve estar MUDO (muted) para o navegador permitir o autoplay -->
            <video id="meuVideo" src="video.mp4" 
                   preload="auto" loop="true" 
                   crossorigin="anonymous" playsinline muted>
            </video>
        </a-assets>

        <!-- Uso do seu arquivo qrcode.patt -->
        <a-marker type="pattern" url="qrcode.patt" vidhandler>
            <a-video 
                src="#meuVideo" 
                width="2" 
                height="1.5" 
                rotation="-90 0 0" 
                position="0 0 0">
            </a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Forçar o play ao primeiro toque na tela (exigência de navegadores mobile)
        window.addEventListener('click', function () {
            var v = document.querySelector('#meuVideo');
            v.play();
            v.pause(); // Apenas para "acordar" o vídeo
        });
    </script>
</body>
</html>
