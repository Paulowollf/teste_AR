<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AR Video</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .info {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
    }

    .start-button {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      padding: 15px 25px;
      border: none;
      border-radius: 14px;
      background: #000;
      color: #fff;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="info">
  Aponte para o marcador Hiro
</div>

<button class="start-button" onclick="startAR()">
  Iniciar Experiência
</button>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  vr-mode-ui="enabled: false"
>

  <a-assets>
    <video
      id="video"
      src="video.mp4"
      preload="auto"
      loop
      muted
      crossorigin="anonymous"
      playsinline
      webkit-playsinline
    ></video>
  </a-assets>

  <!-- MARCADOR -->
  <a-marker preset="hiro">

    <a-video
      src="#video"
      position="0 0.5 0"
      width="1.6"
      height="0.9"
    ></a-video>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
  function startAR() {

    const video = document.getElementById("video");

    video.play();

    document.querySelector(".start-button").style.display = "none";
  }
</script>

</body>
</html>
